backends:
  dry-run:
    status: implemented
    purpose: synthetic benchmarking for CI and offline optimizer validation
    openai_compatible: false
  vllm:
    status: first_class_managed
    priority: 1
    openai_compatible: true
    launch_binary: vllm
    key_flags:
      - --model
      - --dtype
      - --quantization
      - --max-model-len
      - --gpu-memory-utilization
      - --max-num-seqs
      - --enable-chunked-prefill
  sglang:
    status: first_class_managed
    priority: 2
    openai_compatible: true
    key_flags:
      - --model-path
      - --dtype
      - --quantization
      - --context-length
  trt-llm:
    status: planned_only
    priority: 3
    openai_compatible: depends_on_server
    notes:
      - Not in the current Managed Mode scope.
      - An engine build lifecycle design is required before any adapter.
      - External OpenAI compatible deployments may be benchmarked through Attach Mode.
  tgi:
    status: attach_only_external
    priority: 4
    openai_compatible: true
    notes:
      - Serve Optimize does not own its process lifecycle.
      - Existing OpenAI compatible deployments may be benchmarked through Attach Mode.
  lmdeploy:
    status: attach_only_external
    priority: 5
    openai_compatible: true
    notes:
      - Serve Optimize does not own its process lifecycle.
      - Existing OpenAI compatible deployments may be benchmarked through Attach Mode.
  llama-cpp:
    status: attach_only_external
    priority: 6
    openai_compatible: through_server_mode
    notes:
      - Serve Optimize does not own its process lifecycle.
      - Existing OpenAI compatible deployments may be benchmarked through Attach Mode.
